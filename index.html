<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoTrack — Tableau de Bord</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F1117; --surface: #1A1D27; --surface2: #22263A; --border: #2A2F45;
      --text: #E8EAF0; --muted: #6B7280; --green: #10B981; --green-bg: #0D2E22;
      --orange: #F59E0B; --orange-bg: #2D2008; --red: #EF4444; --red-bg: #2D0E0E;
      --blue: #6366F1; --blue-bg: #1A1B3A; --accent: #818CF8;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* SIDEBAR */
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:24px 0; z-index:100; }
    .logo { padding:0 20px 24px; border-bottom:1px solid var(--border); font-size:18px; font-weight:700; letter-spacing:-0.5px; }
    .logo span { color:var(--accent); }
    .nav { padding:16px 12px; flex:1; }
    .nav-label { font-size:10px; font-weight:600; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; padding:8px 8px 4px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer; font-size:13.5px; font-weight:500; color:var(--muted); transition:all .15s; margin-bottom:2px; }
    .nav-item:hover { background:var(--surface2); color:var(--text); }
    .nav-item.active { background:var(--blue-bg); color:var(--accent); }
    .nav-item .icon { font-size:16px; width:20px; text-align:center; }
    .user-section { padding:16px 20px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); }
    .user-name { font-weight:600; color:var(--text); font-size:13px; }

    /* MAIN */
    .main { margin-left:240px; padding:32px 36px; }
    .page-header { margin-bottom:32px; }
    .page-title { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
    .page-date { font-size:13px; color:var(--muted); margin-top:4px; }

    /* KPI */
    .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
    .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 22px; }
    .kpi-label { font-size:12px; color:var(--muted); font-weight:500; margin-bottom:10px; }
    .kpi-value { font-size:32px; font-weight:700; letter-spacing:-1px; }
    .kpi-sub { font-size:12px; color:var(--muted); margin-top:6px; }
    .kpi-card.green .kpi-value { color:var(--green); }
    .kpi-card.orange .kpi-value { color:var(--orange); }
    .kpi-card.blue .kpi-value { color:var(--accent); }

    /* BIG ROW */
    .big-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px; }
    .big-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; }
    .big-card-title { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
    .big-card-amount { font-size:36px; font-weight:700; letter-spacing:-1.5px; color:var(--green); }
    .big-card-sub { font-size:12px; color:var(--muted); margin-top:6px; }
    .progress-bar { height:4px; background:var(--border); border-radius:99px; margin-top:14px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--green); border-radius:99px; }

    /* TABLE */
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .section-title { font-size:16px; font-weight:600; }
    .btn-add { background:var(--blue); color:#fff; border:none; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn-add:hover { opacity:.85; }

    .biens-table { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:visible; margin-bottom:28px; }
    .table-head { display:grid; grid-template-columns:2fr 80px 90px 90px 90px 100px 120px 100px; padding:12px 20px; border-bottom:1px solid var(--border); font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; border-radius:14px 14px 0 0; overflow:hidden; }
    .table-row { display:grid; grid-template-columns:2fr 80px 90px 90px 90px 100px 120px 100px; padding:14px 20px; border-bottom:1px solid var(--border); font-size:13px; align-items:center; transition:background .1s; }
    .table-row:last-child { border-bottom:none; border-radius:0 0 14px 14px; }
    .table-row:hover { background:var(--surface2); }

    .bien-name { font-weight:600; font-size:13.5px; }
    .bien-addr { font-size:11px; color:var(--muted); margin-top:2px; }

    .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:99px; font-size:11px; font-weight:600; }
    .badge.go { background:var(--green-bg); color:var(--green); }
    .badge.limite { background:var(--orange-bg); color:var(--orange); }
    .badge.nogo { background:var(--red-bg); color:var(--red); }

    .statut-badge { display:inline-flex; padding:3px 9px; border-radius:99px; font-size:11px; font-weight:600; cursor:pointer; user-select:none; }
    .statut-badge.prospect { background:var(--blue-bg); color:var(--accent); }
    .statut-badge.visite { background:#1A2D1A; color:#4ADE80; }
    .statut-badge.offre { background:#2D1A0E; color:#FB923C; }
    .statut-badge.refuse { background:var(--red-bg); color:var(--red); }
    .statut-badge.gagne { background:var(--green-bg); color:var(--green); }
    .statut-badge.a_visiter { background:#1A1A3A; color:#C084FC; }
    .statut-badge.estimation { background:#1A2A2A; color:#22D3EE; }

    .prix-m2 { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); }
    .marge { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; }
    .marge.pos { color:var(--green); }
    .marge.neg { color:var(--red); }

    .action-btns { display:flex; gap:6px; }
    .action-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 10px; border-radius:6px; font-size:11px; cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap; }
    .action-btn:hover { border-color:var(--accent); color:var(--accent); }
    .action-btn.danger:hover { border-color:var(--red); color:var(--red); }
    .like-btn { background:transparent; border:none; font-size:18px; cursor:pointer; padding:4px 6px; border-radius:6px; transition:transform .15s; line-height:1; }
    .like-btn:hover { transform:scale(1.2); }
    .like-btn.liked { filter:drop-shadow(0 0 4px #f43f5e); }

    /* STATUT DROPDOWN */
    .statut-wrap { position:relative; }
    .statut-menu { display:none; position:fixed; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:6px; z-index:99999; min-width:140px; box-shadow:0 8px 24px rgba(0,0,0,.4); }
    .statut-menu-item { padding:7px 12px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }
    .statut-menu-item:hover { background:var(--border); }
    .statut-menu-item.prospect { color:var(--accent); }
    .statut-menu-item.visite { color:#4ADE80; }
    .statut-menu-item.offre { color:#FB923C; }
    .statut-menu-item.refuse { color:var(--red); }
    .statut-menu-item.gagne { color:var(--green); }
    .statut-menu-item.a_visiter { color:#C084FC; }
    .statut-menu-item.estimation { color:#22D3EE; }

    /* ANALYSE PAGE */
    .analyse-header { display:flex; align-items:center; gap:16px; margin-bottom:28px; }
    .back-btn { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
    .back-btn:hover { border-color:var(--accent); color:var(--accent); }

    .analyse-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .analyse-section { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .analyse-section.full { grid-column:1/-1; }
    .analyse-section-title { background:var(--blue-bg); border-bottom:1px solid var(--border); padding:12px 18px; font-size:13px; font-weight:700; color:var(--accent); letter-spacing:.02em; }
    .analyse-row { display:flex; align-items:center; justify-content:space-between; padding:11px 18px; border-bottom:1px solid var(--border); font-size:13px; gap:12px; }
    .analyse-row:last-child { border-bottom:none; }
    .analyse-row-label { color:var(--muted); font-size:12.5px; flex:1; }
    .analyse-row-value { font-weight:600; font-family:'DM Mono',monospace; font-size:13px; text-align:right; }
    .analyse-row-note { font-size:11px; color:var(--muted); font-style:italic; text-align:right; max-width:200px; }
    .analyse-input { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-size:13px; font-family:'DM Mono',monospace; font-weight:600; text-align:right; width:130px; outline:none; }
    .analyse-input::-webkit-outer-spin-button,
    .analyse-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .analyse-input[type=number] { -moz-appearance:textfield; appearance:textfield; }
    .analyse-input:focus { border-color:var(--accent); }
    .analyse-input.blue { color:#93C5FD; }
    .analyse-select { background:var(--surface2); border:1px solid var(--border); color:var(--accent); padding:6px 10px; border-radius:6px; font-size:13px; font-weight:700; font-family:inherit; outline:none; cursor:pointer; }

    .gonogo-row { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
    .gonogo-row:last-child { border-bottom:none; }
    .gonogo-label { font-size:13px; font-weight:600; }
    .gonogo-badge { font-size:13px; font-weight:700; padding:6px 18px; border-radius:8px; }
    .gonogo-badge.go { background:var(--green-bg); color:var(--green); }
    .gonogo-badge.limite { background:var(--orange-bg); color:var(--orange); }
    .gonogo-badge.nogo { background:var(--red-bg); color:var(--red); }

    .highlight-green { color:var(--green); }
    .highlight-orange { color:var(--orange); }
    .highlight-red { color:var(--red); }
    .highlight-blue { color:var(--accent); }

    .save-bar { position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--border); padding:16px 0; display:flex; gap:12px; justify-content:flex-end; margin-top:24px; }
    .btn-save { background:var(--blue); border:none; color:#fff; padding:10px 28px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn-save:hover { opacity:.9; }

    /* COMPARAISON */
    .compare-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:28px; }
    .compare-grid { display:grid; gap:10px; margin-top:16px; }
    .compare-row { display:flex; align-items:center; gap:12px; font-size:13px; }
    .compare-name { width:200px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .compare-bar-wrap { flex:1; height:8px; background:var(--border); border-radius:99px; overflow:hidden; }
    .compare-bar-fill { height:100%; border-radius:99px; transition:width .8s ease; }
    .compare-pct { width:60px; text-align:right; font-family:'DM Mono',monospace; font-size:12px; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }

    /* EXPORT/IMPORT */
    .export-btn { background:var(--surface2); border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
    .export-btn:hover { border-color:var(--accent); color:var(--accent); }
    .export-btn.import { border-color:var(--green); color:var(--green); }
    .export-btn.import:hover { background:var(--green-bg); }

    /* PREVIEW PANEL */
    .preview-overlay { display:none; position:fixed; inset:0; z-index:500; }
    .preview-overlay.open { display:block; }
    .preview-panel {
      position:fixed; right:0; top:0; bottom:0; width:380px;
      background:var(--surface); border-left:1px solid var(--border);
      z-index:501; overflow-y:auto; padding:24px;
      transform:translateX(100%); transition:transform .25s ease;
    }
    .preview-overlay.open .preview-panel { transform:translateX(0); }
    .preview-bg { position:fixed; inset:0; background:rgba(0,0,0,.4); }
    .preview-close { position:absolute; top:16px; right:16px; background:var(--surface2); border:1px solid var(--border); color:var(--muted); width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
    .preview-close:hover { color:var(--text); }
    .preview-title { font-size:17px; font-weight:700; letter-spacing:-0.3px; margin-bottom:4px; padding-right:32px; }
    .preview-addr { font-size:12px; color:var(--muted); margin-bottom:20px; }
    .preview-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .preview-item { background:var(--surface2); border-radius:10px; padding:12px 14px; }
    .preview-item-label { font-size:10.5px; color:var(--muted); margin-bottom:4px; font-weight:500; }
    .preview-item-value { font-size:16px; font-weight:700; font-family:'DM Mono',monospace; }
    .preview-item-value.green { color:var(--green); }
    .preview-item-value.orange { color:var(--orange); }
    .preview-item-value.red { color:var(--red); }
    .preview-item-value.blue { color:var(--accent); }
    .preview-gonogo { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border-radius:10px; padding:12px 14px; margin-bottom:10px; }
    .preview-gonogo-label { font-size:12px; font-weight:600; }
    .preview-btn { width:100%; background:var(--blue); border:none; color:#fff; padding:11px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:14px; }
    .preview-btn:hover { opacity:.9; }
    .empty-state .emoji { font-size:48px; margin-bottom:16px; }

    /* SIMULATEUR */
    .sim-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; max-width:560px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:12px; font-weight:600; color:var(--muted); }
    .form-input { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:8px; font-size:13px; font-family:inherit; outline:none; }
    .form-input:focus { border-color:var(--accent); }
    .result-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; }
    .result-item { background:var(--surface2); border-radius:10px; padding:14px 16px; }
    .result-item-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .result-item-value { font-size:18px; font-weight:700; font-family:'DM Mono',monospace; }
    .result-item-value.green { color:var(--green); }
    .result-item-value.orange { color:var(--orange); }
    .result-item-value.red { color:var(--red); }
    .gonogo-bar { background:var(--surface2); border-radius:10px; padding:16px; display:flex; align-items:center; justify-content:space-between; margin:8px 0; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">🏠 Immo<span>Track</span></div>
  <nav class="nav">
    <div class="nav-label">Suivi</div>
    <div class="nav-item active" onclick="showPage('dashboard')"><span class="icon">📊</span> Tableau de bord</div>
    <div class="nav-item" onclick="showPage('biens')"><span class="icon">🏘️</span> Mes biens</div>
    <div class="nav-item" onclick="showPage('comparaison')"><span class="icon">⚖️</span> Comparaison</div>
    <div class="nav-label" style="margin-top:16px">Analyse</div>
    <div class="nav-item" onclick="showPage('simulateur')"><span class="icon">🧮</span> Simulateur</div>
  </nav>
  <div class="user-section">
    <div class="user-name">Manon Jahan</div>
    <div style="margin-bottom:10px">Investisseur achat-revente</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="export-btn" onclick="exportData()" title="Télécharger une sauvegarde de vos biens">💾 Exporter</button>
      <button class="export-btn import" onclick="document.getElementById('import-input').click()" title="Restaurer une sauvegarde">📂 Importer</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
      <button class="export-btn" onclick="exportExcel()" title="Exporter tous les biens en Excel (un onglet par bien)" style="border-color:#22D3EE;color:#22D3EE;margin-top:4px;width:100%">📊 Export Excel</button>
    </div>
  </div>
</aside>

<main class="main" id="main-content"></main>

<div id="statut-menus"></div>

<!-- PREVIEW PANEL -->
<div class="preview-overlay" id="preview-overlay">
  <div class="preview-bg" onclick="closePreview()"></div>
  <div class="preview-panel" id="preview-panel"></div>
</div>

<script>
// ═══ DONNÉES ═══
function getBiens() { try { return JSON.parse(localStorage.getItem('immotrack_biens')||'[]'); } catch(e) { return []; } }
function saveBiens(b) { localStorage.setItem('immotrack_biens', JSON.stringify(b)); }

function initDemo() {
  if (getBiens().length > 0) return;
  saveBiens([
    { id:1, nom:"Appartement 2P Saint-Denis", adresse:"Saint-Denis 93200 — La Plaine", prix:187000, surface:48, travaux:35000, prixRevente:240000, prixM2Ref:3900, fraisAgence:false, tauxAgence:0.04, interets:false, montantEmprunte:150000, tauxInteret:0.035, dureefranchise:12, loyer:0, margeCibleNette:0.15, margeCibleBrute:0.20, like:false, like:false, lien:'', tauxNotaire:0.075, tauxPV:0.362, statut:"visite", notes:"Bon état général, cuisine à refaire", date:"2026-04-15" },
    { id:2, nom:"T3 Pantin Ourcq", adresse:"Pantin 93500 — Ourcq", prix:320000, surface:62, travaux:45000, prixRevente:420000, prixM2Ref:6500, fraisAgence:false, tauxAgence:0.04, interets:false, montantEmprunte:280000, tauxInteret:0.035, dureefranchise:12, loyer:0, margeCibleNette:0.15, margeCibleBrute:0.20, like:false, like:false, lien:'', tauxNotaire:0.075, tauxPV:0.362, statut:"offre", notes:"Offre à 295 000€ faite", date:"2026-04-28" },
    { id:3, nom:"Studio Montreuil Mairie", adresse:"Montreuil 93100 — Mairie", prix:210000, surface:31, travaux:20000, prixRevente:250000, prixM2Ref:6800, fraisAgence:false, tauxAgence:0.04, interets:false, montantEmprunte:180000, tauxInteret:0.035, dureefranchise:12, loyer:0, margeCibleNette:0.15, margeCibleBrute:0.20, like:false, like:false, lien:'', tauxNotaire:0.075, tauxPV:0.362, statut:"refuse", notes:"Vendeur n'a pas accepté", date:"2026-03-10" }
  ]);
}

// ═══ CALCULS COMPLETS ═══
function calcul(b) {
  const notaire = Math.round(b.prix * (b.tauxNotaire||0.075));
  const fraisAgenceMt = b.fraisAgence ? Math.round(b.prixRevente * (b.tauxAgence||0.04)) : 0;
  const interetsMt = b.interets ? Math.round((b.montantEmprunte||0) * (b.tauxInteret||0.035) * (b.dureefranchise||12)/12) : 0;
  const coutAcquisition = b.prix + notaire;
  const coutOperation = coutAcquisition + (b.travaux||0);
  const coutTotal = coutOperation + fraisAgenceMt + interetsMt;
  const margeBrute = b.prixRevente - coutOperation;
  const margeBrutePct = b.prixRevente > 0 ? margeBrute/b.prixRevente : 0;
  const impo = margeBrute > 0 ? Math.round(margeBrute * (b.tauxPV||0.362)) : 0;
  const margeNette = margeBrute - impo - fraisAgenceMt - interetsMt;
  const margeNettePct = b.prixRevente > 0 ? margeNette/b.prixRevente : 0;
  const prixM2Achat = b.surface > 0 ? Math.round(b.prix/b.surface) : 0;
  const prixM2Cout = b.surface > 0 ? Math.round(coutOperation/b.surface) : 0;
  const prixM2Revente = b.surface > 0 ? Math.round(b.prixRevente/b.surface) : 0;
  const gonogoBrut = margeBrutePct >= 0.20 ? 'go' : margeBrutePct >= 0.18 ? 'limite' : 'nogo';
  const gonogoNet = margeNettePct >= 0.15 ? 'go' : margeNettePct >= 0.12 ? 'limite' : 'nogo';
  // Prix offre max
  const cibleBrute = b.margeCibleBrute || 0.20;
  const cibleNette = b.margeCibleNette || 0.15;
  const prixMaxBrute = (b.prixRevente*(1-cibleBrute) - (b.travaux||0)) / 1.075;
  const prixMaxNette = ((b.prixRevente*(1-cibleNette/(1-0.362))) - (b.travaux||0)) / 1.075;
  const prixOffreConseille = Math.min(prixMaxBrute, prixMaxNette);
  const decote = b.prix > 0 ? (b.prix - prixOffreConseille)/b.prix : 0;
  const rendBrut = b.loyer > 0 && b.prixRevente > 0 ? b.loyer/b.prixRevente : 0;
  const rendNet = b.loyer > 0 && b.prixRevente > 0 ? (b.loyer*0.7)/b.prixRevente : 0;
  return { notaire, fraisAgenceMt, interetsMt, coutAcquisition, coutOperation, coutTotal, margeBrute, margeBrutePct, impo, margeNette, margeNettePct, prixM2Achat, prixM2Cout, prixM2Revente, gonogoBrut, gonogoNet, prixMaxBrute, prixMaxNette, prixOffreConseille, decote, rendBrut, rendNet };
}

const fmtE = n => n !== undefined && n !== null && !isNaN(n) ? Math.round(n).toLocaleString('fr-FR') + ' €' : '—';
const fmtP = n => n ? (n*100).toFixed(1)+'%' : '—';
const statutLabel = { prospect:'Prospect', a_visiter:'À visiter', estimation:'Estimation en cours', visite:'Visité', offre:'Offre faite', refuse:'Refusé', gagne:'Acquis' };
const gLabel = { go:'✅ GO', limite:'⚠️ LIMITE', nogo:'❌ NO-GO' };

// ═══ NAVIGATION ═══
let currentPage = 'dashboard';
let currentBienId = null;

function showPage(page, bienId) {
  currentPage = page;
  currentBienId = bienId || null;
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.toggle('active', ['dashboard','biens','comparaison','simulateur'][i] === page);
  });
  render();
}

function render() {
  const main = document.getElementById('main-content');
  const biens = getBiens();
  const today = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  if (currentPage === 'dashboard') renderDashboard(main, biens, today);
  else if (currentPage === 'biens') renderBiens(main, biens);
  else if (currentPage === 'analyse') renderAnalyse(main, biens);
  else if (currentPage === 'comparaison') renderComparaison(main, biens);
  else if (currentPage === 'simulateur') renderSimulateur(main);
  // Init simulateur offre après render de la page analyse
  if (currentPage === 'analyse') setTimeout(initSimOffre, 50);
}

// ═══ DASHBOARD ═══
function renderDashboard(main, biens, today) {
  const actifs = biens.filter(b=>b.statut!=='refuse').length;
  const offres = biens.filter(b=>b.statut==='offre').length;
  const gagnes = biens.filter(b=>b.statut==='gagne').length;
  const biensAcquis = biens.filter(b=>b.statut==='gagne');
  const totalInvesti = biensAcquis.reduce((s,b)=>s+(b.prix||0),0);
  const totalMarge = biensAcquis.reduce((s,b)=>s+calcul(b).margeNette,0);
  main.innerHTML = `
    <div class="page-header">
      <div class="page-title">Tableau de bord</div>
      <div class="page-date">Bonjour — ${today}</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Biens suivis</div><div class="kpi-value">${biens.length}</div><div class="kpi-sub">${actifs} actifs en cours</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Offres faites</div><div class="kpi-value">${offres}</div><div class="kpi-sub">en attente de réponse</div></div>
      <div class="kpi-card green"><div class="kpi-label">Biens acquis</div><div class="kpi-value">${gagnes}</div><div class="kpi-sub">chantier(s) en cours</div></div>
      <div class="kpi-card blue"><div class="kpi-label">Refusés</div><div class="kpi-value">${biens.filter(b=>b.statut==='refuse').length}</div><div class="kpi-sub">ce mois-ci</div></div>
    </div>
    <div class="big-row">
      <div class="big-card">
        <div class="big-card-title">Capital engagé total</div>
        <div class="big-card-amount">${totalInvesti>0?(totalInvesti/1000000).toFixed(2)+' M€':'0 €'}</div>
        <div class="big-card-sub">Prix d'achat cumulé des biens acquis</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,totalInvesti/3000000*100)}%"></div></div>
      </div>
      <div class="big-card">
        <div class="big-card-title">Marge nette estimée totale</div>
        <div class="big-card-amount" style="color:${totalMarge>0?'var(--green)':'var(--red)'}">${totalMarge>0?'+':''}${fmtE(totalMarge)}</div>
        <div class="big-card-sub">Après impôt PV sur les biens acquis uniquement</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,Math.max(0,totalMarge/500000*100))}%"></div></div>
      </div>
    </div>
    ${renderBiensTable(biens, 5, true)}`;
}

// ═══ TABLE BIENS ═══
function renderBiens(main, biens) {
  main.innerHTML = `
    <div class="page-header"><div class="page-title">Mes biens</div><div class="page-date">Tous les biens suivis</div></div>
    <div class="section-header">
      <div class="section-title">${biens.length} bien${biens.length>1?'s':''}</div>
      <button class="btn-add" onclick="ajouterBien()">+ Ajouter manuellement</button>
    </div>
    ${renderBiensTable(biens, null, false)}`;
}

function renderBiensTable(biens, limit, mini) {
  const items = limit ? biens.slice(0,limit) : biens;
  return `
    <div class="section-header">
      <div class="section-title">${mini?'Biens récents':''}</div>
      ${mini?'<button class="btn-add" style="background:transparent;border:1px solid var(--border);color:var(--muted)" onclick="showPage(\'biens\')">Voir tous →</button>':''}
    </div>
    <div class="biens-table">
      <div class="table-head"><div>Bien</div><div>Surface</div><div>Prix achat</div><div>Revente</div><div>Marge nette</div><div>Go/No-Go</div><div>Statut</div><div>Actions</div></div>
      ${items.length===0?`<div style="padding:48px;text-align:center;color:var(--muted)">Aucun bien — clique sur Simuler depuis LeBonCoin</div>`:
        items.map(b => {
          const c = calcul(b);
          return `<div class="table-row" onclick="openPreview(${b.id})" style="cursor:pointer">
            <div><div class="bien-name">${b.nom}</div><div class="bien-addr">${b.adresse}</div></div>
            <div class="prix-m2">${b.surface} m²<br>${c.prixM2Achat.toLocaleString('fr-FR')} €/m²</div>
            <div class="prix-m2">${fmtE(b.prix)}</div>
            <div class="prix-m2">${fmtE(b.prixRevente)}</div>
            <div class="marge ${c.margeNette>0?'pos':'neg'}">${fmtE(c.margeNette)}<br>${fmtP(c.margeNettePct)}</div>
            <div><span class="badge ${c.gonogoBrut}">${gLabel[c.gonogoBrut]}</span></div>
            <div class="statut-wrap">
              <span class="statut-badge ${b.statut}" onclick="toggleStatutMenu(${b.id},this)">${statutLabel[b.statut]} ▾</span>
              <div class="statut-menu" id="sm-${b.id}">
                ${Object.entries(statutLabel).map(([k,v])=>`<div class="statut-menu-item ${k}" onclick="changeStatut(${b.id},'${k}')">${v}</div>`).join('')}
              </div>
            </div>
            <div class="action-btns">
              <button class="like-btn ${b.like?'liked':''}" onclick="toggleLike(${b.id});event.stopPropagation()" title="${b.like?'Retirer des favoris':'Ajouter aux favoris'}">${b.like?'❤️':'🤍'}</button>
              <button class="action-btn" onclick="showPage('analyse',${b.id});event.stopPropagation()">📋 Analyse</button>
              <button class="action-btn danger" onclick="supprimerBien(${b.id});event.stopPropagation()">🗑</button>
            </div>
          </div>`;
        }).join('')}
    </div>`;
}

// ═══ ANALYSE COMPLÈTE ═══

// ═══ UPDATE FIELD EN TEMPS RÉEL (sans re-render) ═══
function updateBienField(id, field, value) {
  const biens = getBiens();
  const idx = biens.findIndex(b=>b.id===id);
  if (idx<0) return;
  const numFields = ['prix','surface','travaux','prixRevente','prixM2Ref','loyer','montantEmprunte','tauxInteret','dureefranchise','tauxAgence','margeCibleNette','margeCibleBrute','tauxNotaire','tauxPV'];
  const isNum = numFields.includes(field);
  const isBool = typeof value === 'boolean';
  biens[idx][field] = isBool ? value : (isNum ? parseFloat(value)||0 : value);
  saveBiens(biens);
  updateCalcDisplay(biens[idx]);
  // Si c'est une option activable (bool), on re-render pour afficher/masquer les sous-champs
  if (isBool) render();
}

function updateCalcDisplay(b) {
  const c = calcul(b);
  const set = (id, val, cls) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = val;
    if (cls) { el.className = el.className.replace(/highlight-\w+/g,''); el.classList.add(cls); }
  };
  const colorB = c.gonogoBrut==='go'?'highlight-green':c.gonogoBrut==='limite'?'highlight-orange':'highlight-red';
  const colorN = c.gonogoNet==='go'?'highlight-green':c.gonogoNet==='limite'?'highlight-orange':'highlight-red';
  const colorMB = c.margeBrute>0?'highlight-green':'highlight-red';
  const colorMN = c.margeNette>0?'highlight-green':'highlight-red';

  set('rv-notaire',    fmtE(c.notaire));
  set('rv-coutAcq',    fmtE(c.coutAcquisition));
  set('rv-coutOp',     fmtE(c.coutOperation));
  set('rv-agence',     fmtE(c.fraisAgenceMt));
  set('rv-interets',   fmtE(c.interetsMt));
  set('rv-coutTotal',  fmtE(c.coutTotal));
  set('rv-margeBruteE',  fmtE(c.margeBrute), colorMB);
  set('rv-margeBrutePct', fmtP(c.margeBrutePct), colorB);
  set('rv-impo',         fmtE(c.impo));
  set('rv-margeNetteE',  fmtE(c.margeNette), colorMN);
  set('rv-margeNettePct', fmtP(c.margeNettePct), colorN);
  set('rv-prixMaxNette',  fmtE(c.prixMaxNette));
  set('rv-prixMaxBrute',  fmtE(c.prixMaxBrute));
  set('rv-prixOffre',     fmtE(c.prixOffreConseille));
  set('rv-decote',        fmtP(c.decote));
  set('rv-m2Achat',       fmtE(c.prixM2Achat).replace(' €',' €/m²'));
  set('rv-m2Cout',        fmtE(c.prixM2Cout).replace(' €',' €/m²'));
  set('rv-m2Revente',     fmtE(c.prixM2Revente).replace(' €',' €/m²'));
  set('rv-ecart',         b.prixM2Ref>0?((c.prixM2Revente/b.prixM2Ref-1)*100).toFixed(1)+'%':'—');
  set('rv-rendBrut',      c.rendBrut>0?fmtP(c.rendBrut):'Loyer non renseigné');
  set('rv-rendNet',       c.rendNet>0?fmtP(c.rendNet):'—');

  // Go/No-Go badges
  const ggB = document.getElementById('rv-gonogoBrut');
  if (ggB) { ggB.textContent = gLabel[c.gonogoBrut]+' — '+fmtP(c.margeBrutePct); ggB.className='gonogo-badge '+c.gonogoBrut; }
  const ggN = document.getElementById('rv-gonogoNet');
  if (ggN) { ggN.textContent = gLabel[c.gonogoNet]+' — '+fmtP(c.margeNettePct); ggN.className='gonogo-badge '+c.gonogoNet; }
}

function toggleStatutMenu(id, el) {
  document.querySelectorAll('.statut-menu').forEach(m=>{ if(m.id!=='sm-'+id) m.style.display='none'; });
  const menu=document.getElementById('sm-'+id);
  if(!menu) return;
  if(menu.style.display==='block'){menu.style.display='none';return;}
  const rect=el.getBoundingClientRect();
  menu.style.position='fixed';
  menu.style.left=rect.left+'px';
  menu.style.display='block';
  const menuH=menu.offsetHeight;
  menu.style.top=(window.innerHeight-rect.bottom<menuH+8)?(rect.top-menuH-4)+'px':(rect.bottom+4)+'px';
}

// ═══ SIMULATEUR D'OFFRE ═══
function simOffre(id, offreVal) {
  const biens = getBiens();
  const b = biens.find(x => x.id === id);
  if (!b) return;
  const offre = parseFloat(offreVal) || 0;
  if (!offre) return;

  // Calcule avec le prix d'offre simulé
  const notaire = Math.round(offre * (b.tauxNotaire||0.075));
  const coutOp = offre + notaire + (b.travaux||0);
  const margeBrute = b.prixRevente - coutOp;
  const margeBrutePct = b.prixRevente > 0 ? margeBrute/b.prixRevente : 0;
  const impo = margeBrute > 0 ? Math.round(margeBrute * (b.tauxPV||0.362)) : 0;
  const margeNette = margeBrute - impo;
  const margeNettePct = b.prixRevente > 0 ? margeNette/b.prixRevente : 0;
  const gonogo = margeBrutePct >= 0.20 ? 'go' : margeBrutePct >= 0.18 ? 'limite' : 'nogo';

  const colorB = margeBrute > 0 ? 'highlight-green' : 'highlight-red';
  const colorN = margeNette > 0 ? 'highlight-green' : 'highlight-red';

  const elMB = document.getElementById('sim-marge-brute-' + id);
  const elMN = document.getElementById('sim-marge-nette-' + id);
  const elGG = document.getElementById('sim-gonogo-' + id);

  if (elMB) {
    elMB.className = 'analyse-row-value ' + colorB;
    elMB.textContent = fmtE(margeBrute) + ' (' + fmtP(margeBrutePct) + ')';
  }
  if (elMN) {
    elMN.className = 'analyse-row-value ' + colorN;
    elMN.textContent = fmtE(margeNette) + ' (' + fmtP(margeNettePct) + ')';
  }
  if (elGG) {
    elGG.className = 'gonogo-badge ' + gonogo;
    elGG.textContent = gLabel[gonogo];
  }
}

}

}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const biens = JSON.parse(e.target.result);
      if (!Array.isArray(biens)) throw new Error('Format invalide');
      if (confirm(`Importer ${biens.length} bien(s) ? Cela remplacera vos données actuelles.`)) {
        saveBiens(biens);
        render();
        alert(`✅ ${biens.length} bien(s) importé(s) avec succès !`);
      }
    } catch(err) {
      alert('❌ Fichier invalide — utilise uniquement un fichier exporté depuis ImmoTrack');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// Lit les données passées dans l'URL par le script LBC (?add=...)
function checkURLHash() {
  try {
    // Lecture depuis query param ?add=
    const params = new URLSearchParams(window.location.search);
    const encoded = params.get('add');
    if (!encoded) return;
    const data = JSON.parse(decodeURIComponent(encoded));
    // Nettoie l'URL pour éviter de re-ajouter au rafraîchissement
    history.replaceState(null, '', window.location.pathname);
    window.addBienFromLBC(data);
  } catch(e) { console.error('ImmoTrack URL parse error:', e); }
}
